dwindle {
    # pseudotile = true
    preserve_split = true
}
master {
    new_status = master
}
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
windowrule = match:class clipse, float true
windowrule = match:class clipse, size 622 652
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

windowrulev = float, title:^(hyprhelp)$
windowrulev = center, title:^(hyprhelp)$
windowrulev = size 600 500, title:^(hyprhelp)$
windowrulev = dimaround, title:^(hyprhelp)$
windowrulev = stayfocused, title:^(hyprhelp)$

windowrule = match:class ^(kitty)$, rounding 0

layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    match:namespace = vicinae
}

layerrule{
    name = swaync-control-center
    blur = on
    ignore_alpha = 0
}


layerrule {
    name = vicinae-no-animation
    no_anim = off
    match:namespace = vicinae
}


