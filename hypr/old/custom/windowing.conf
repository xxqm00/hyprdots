# The window(s)
env = HYPRSHOT_DIR, /home/komari/Pictures/Screenshots/
general {
    gaps_in = 2
    gaps_out = 2
    border_size = 2
    col.active_border = rgba(1b1b1bff) rgba(1b1b1bff)
    col.inactive_border = rgba(1a1a1aff) rgba(1a1a1aff)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}
decoration {
    rounding = 5
    rounding_power = 5
    active_opacity = 1
    inactive_opacity = 1
    shadow {
        enabled = true
        range = 2
        render_power = 10
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = false
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}



animations {
    enabled = true
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.5, 0, 0.99, 0.99
    bezier = smoothIn, 0.5, -0.5, 0.68, 1.5
    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 3, smoothOut
    animation = windowsIn, 1, 3, smoothOut
    animation = windowsMove, 1, 4, smoothIn, slide
    animation = border, 1, 5, default
    animation = fade, 1, 5, smoothIn
    animation = fadeDim, 1, 5, smoothIn
    animation = workspaces, 1, 6, default
}

