#                   Workspaces

bind = alt, W, movefocus, u # Move focus up
bind = alt, A, movefocus, l # Move focus left
bind = alt, S, movefocus, d # Move focus down
bind = alt, D, movefocus, r # Move focus up right

# ===== MOVING WINDOWS =====
bind = alt SHIFT, W,  movewindow, u # Move window up
bind = alt SHIFT, A, movewindow, l # Move window left
bind = alt SHIFT, S,    movewindow, d # Move window down
bind = alt SHIFT, D,  movewindow, r # Move window right

# ===== RESIZE =====
binde = $mainMod, right, resizeactive,  30 0 # Shrink to the right
binde = $mainMod, left,  resizeactive, -30 0 # Shrink to the left
binde = $mainMod, up,    resizeactive,  0 -30 # Shrink to the top
binde = $mainMod, down,  resizeactive,  0  30 # Shrink to the bottom


bind = $mainMod, 1, workspace, 1 # Move to workspace 1
bind = $mainMod, 2, workspace, 2 # Move to workspace 2
bind = $mainMod, 3, workspace, 3 # Move to workspace 3
bind = $mainMod, 4, workspace, 4 # Move to workspace 4
bind = $mainMod, 5, workspace, 5 # Move to workspace 5
bind = $mainMod, 6, workspace, 6 # Move to workspace 6
bind = $mainMod, 7, workspace, 7 # Move to workspace 7
bind = $mainMod, 8, workspace, 8 # Move to workspace 8
bind = $mainMod, 9, workspace, 9 # Move to workspace 9
bind = $mainMod, 0, workspace, 10 # Move to workspace 10

# Move active window to a workspace with super + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1 # Move focused application to workspace 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2 # Move focused application to workspace 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3 # Move focused application to workspace 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4 # Move focused application to workspace 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5 # Move focused application to workspace 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6 # Move focused application to workspace 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7 # Move focused application to workspace 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8 # Move focused application to workspace 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9 # Move focused application to workspace 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10 # Move focused application to workspace 10

# These are my laptops keycodes for the numpad, use wev to find your own keycode.
# code: 87 = one on the numpad
bind = super, code:87, workspace, 1 # (Numpad Version) Move to workspace 1
bind = super, code:88, workspace, 2 # (Numpad Version) Move to workspace 2
bind = super, code:89, workspace, 3 # (Numpad Version) Move to workspace 3
bind = super, code:83, workspace, 4 # (Numpad Version) Move to workspace 4
bind = super, code:84, workspace, 5 # (Numpad Version) Move to workspace 5
bind = super, code:85, workspace, 6 # (Numpad Version) Move to workspace 6
bind = super, code:79, workspace, 7 # (Numpad Version) Move to workspace 7
bind = super, code:80, workspace, 8 # (Numpad Version) Move to workspace 8
bind = super, code:81, workspace, 9 # (Numpad Version) Move to workspace 9


################# 
## Mouse binds ##
################# 
#for that one mouse that chris gave me, the buttons on the side are 276 (first) and 275 (second)
bindm = $mainMod, mouse:272, movewindow # Left click: Moves the focused window
bindm = $mainMod, mouse:273, resizewindow # RIght click: Resizes the focused window
# Scroll through existing workspaces with super + scroll
bind = $mainMod, mouse_down, workspace, e+1 # Scroll up to go up one workspace
bind = $mainMod, mouse_up, workspace, e-1 # Scroll down to go up one workspace


