$menu = wofi     
$mainMod = SUPER
$terminal = kitty                 
$browser = zen-browser
$fileManager = thunar           
$musicPlayer = com.spotify.Client # flatpak version - iirc, aur version is "spotify"
###################################

######################################
## Binds with $mainMod + single key ##
######################################

bind = $mainMod alt, escape, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit # Logout to SDDM
bind = $mainMod, C, killactive, # Kills focused tab
bind = $mainMod, code:61, exec, [focus; float; 350 350] hyprkcs # Opens Bind Manager #Forward Slash 
bind = $mainMod, E, exec, $fileManager # Opens File Manager
bind = $mainMod, F, fullscreen # Fullscreen
bind = $mainMod, L, exec, veila lock # Locks Scren
bind = $mainMod, N, exec, swaync-client -t -sw # Notification Manager
bind = $mainMod, R, exec, [focus; float; 100 100] $terminal # terminal
bind = $mainMod, S, layoutmsg, togglesplit dwindle # Switches split type
bind = $mainMod, Space, exec, vicinae toggle # Opens Search bar (vicinae)
bind = $mainMod, T, exec, $terminal # Opens terminal (group)
bind = $mainMod, V, togglefloating, # toggle floating
bind = $mainMod, W, exec, killall -SIGUSR1 waybar # hide waybar
bind = $mainMod, Z, exec, $browser # zen browser

############################################
## unused binds for $mainmod + single key ##
