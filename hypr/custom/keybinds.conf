##########################################
## Binds with $mainMod + modifier + key ##
##########################################

bind = SUPER Alt, C, exec, vicinae vicinae://launch/clipboard/history # Opens Clipboard via Vicinae
bind = $mainMod Alt, S, exec, $musicPlayer # Opens the music player (spotfy)

bind = $mainMod shift, W, exec, killall -SIGUSR2 waybar # Reloads Waybar
bind = $mainMod,Print, exec, hyprshot -m region # Screenshots a selected region
bind = $mainMod SHIFT, D, exec,[focus; float; 100 100] waypaper # Opens Wallpaper Switcher

